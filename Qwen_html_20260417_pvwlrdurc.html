<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BT & FM Mic Transceiver</title>
  <style>
    :root {
      --bg: #0b0d12;
      --surface: #161920;
      --text: #e2e4ea;
      --accent: #00d4ff;
      --green: #00ff88;
      --red: #ff3b5c;
      --btn-bg: #21252d;
      --btn-border: #2d323c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      overscroll-behavior: none;
    }
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .led {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .led.connected {
      background: var(--green);
      box-shadow: 0 0 10px var(--green), 0 0 24px rgba(0,255,136,0.35);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.5px; }
    .mode-toggle {
      display: flex;
      background: var(--surface);
      padding: 4px;
      border-radius: 24px;
      border: 1px solid var(--btn-border);
    }
    .mode-btn {
      background: transparent;
      color: #777;
      border: none;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .mode-btn.active {
      background: var(--accent);
      color: #000;
      box-shadow: 0 2px 8px rgba(0,212,255,0.3);
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 440px;
      margin: 0 auto;
      width: 100%;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--btn-border);
      border-radius: 12px;
      padding: 14px;
    }
    .card h3 { font-size: 0.95rem; margin-bottom: 10px; color: #aaa; }
    .scanner-btn {
      width: 100%;
      padding: 11px;
      background: var(--btn-bg);
      color: var(--text);
      border: 1px solid var(--btn-border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .scanner-btn:active { background: #2a2f38; }
    ul { list-style: none; margin-top: 10px; }
    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 10px;
      background: var(--btn-bg);
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }
    li button {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
    }
    .fm-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .fm-row input {
      flex: 1;
      padding: 10px;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      color: var(--text);
      border-radius: 8px;
      font-size: 0.95rem;
    }
    #fmStatus { font-size: 0.8rem; color: #777; min-height: 18px; }
    .ptt-section { text-align: center; margin-top: 12px; }
    .ptt-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #ff5e3a, #ff2a52);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255,42,82,0.35);
      transition: transform 0.1s, box-shadow 0.1s;
      user-select: none;
      -webkit-user-select: none;
    }
    .ptt-btn.pressing {
      transform: scale(0.97);
      box-shadow: 0 2px 10px rgba(255,42,82,0.5);
      background: linear-gradient(135deg, #e04520, #d41c3f);
    }
    footer {
      text-align: center;
      padding: 14px 0 10px;
      font-size: 0.8rem;
      color: #666;
      border-top: 1px solid var(--btn-border);
      margin-top: auto;
    }
  </style>
</head>
<body>
  <header>
    <div class="led" id="statusLed"></div>
    <h1>MIC TRANSCEIVER</h1>
    <div class="mode-toggle">
      <button id="btnTx" class="mode-btn">TX</button>
      <button id="btnRx" class="mode-btn active">RX</button>
    </div>
  </header>

  <main>
    <section class="card">
      <h3>📶 Bluetooth</h3>
      <button id="scanBt" class="scanner-btn">Scan Devices</button>
      <ul id="btList"></ul>
    </section>

    <section class="card">
      <h3>📻 FM Frequency</h3>
      <div class="fm-row">
        <input type="number" id="fmFreq" min="88.1" max="108.0" step="0.1" value="92.5">
        <button id="tuneFm" class="scanner-btn">Tune & Connect</button>
      </div>
      <div id="fmStatus"></div>
    </section>

    <section class="ptt-section">
      <button id="pttBtn" class="ptt-btn">🎤 HOLD TO TRANSMIT</button>
    </section>
  </main>

  <footer id="statusBar">Ready | Mode: RX | Channel: None</footer>

  <script>
    // State
    let mode = 'RX';
    let isConnected = false;
    let channel = 'None';
    let audioCtx = null;
    let micStream = null;
    let isPressing = false;

    // DOM
    const statusLed = document.getElementById('statusLed');
    const btnTx = document.getElementById('btnTx');
    const btnRx = document.getElementById('btnRx');
    const scanBt = document.getElementById('scanBt');
    const btList = document.getElementById('btList');
    const fmFreq = document.getElementById('fmFreq');
    const tuneFm = document.getElementById('tuneFm');
    const fmStatus = document.getElementById('fmStatus');
    const pttBtn = document.getElementById('pttBtn');
    const statusBar = document.getElementById('statusBar');

    // Init
    updateUI();

    // Mode Toggle
    btnTx.addEventListener('click', () => setMode('TX'));
    btnRx.addEventListener('click', () => setMode('RX'));

    function setMode(newMode) {
      mode = newMode;
      updateUI();
      if (mode === 'RX') releasePTT();
    }

    // PTT Logic
    const startPTT = (e) => {
      e.preventDefault();
      if (!isConnected) return alert('🔴 Please connect to a device first.');
      isPressing = true;
      setMode('TX');
      pttBtn.classList.add('pressing');
      startMic();
    };

    const releasePTT = (e) => {
      e.preventDefault();
      isPressing = false;
      setMode('RX');
      pttBtn.classList.remove('pressing');
      stopMic();
    };

    pttBtn.addEventListener('mousedown', startPTT);
    pttBtn.addEventListener('touchstart', startPTT, { passive: false });
    window.addEventListener('mouseup', releasePTT);
    window.addEventListener('touchend', releasePTT);
    pttBtn.addEventListener('contextmenu', e => e.preventDefault());

    // Audio
    async function startMic() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        console.log('🎤 Mic active for transmission');
      } catch (err) {
        console.error('Mic error:', err);
        alert('🚫 Microphone access required.');
      }
    }

    function stopMic() {
      if (micStream) {
        micStream.getTracks().forEach(track => track.stop());
        micStream = null;
      }
    }

    // Bluetooth Scanner (Simulated + Real API hook)
    scanBt.addEventListener('click', async () => {
      btList.innerHTML = '<li style="color:#888;">Scanning...</li>';
      setTimeout(() => {
        btList.innerHTML = '';
        ['BT Headset Pro', 'Car Stereo', 'Portable Speaker'].forEach(name => {
          const li = document.createElement('li');
          li.innerHTML = `<span>${name}</span><button class="connect-btn">Connect</button>`;
          btList.appendChild(li);
        });
        document.querySelectorAll('.connect-btn').forEach(btn => {
          btn.addEventListener('click', () => connectDevice('BT', btn.parentElement.querySelector('span').textContent));
        });
      }, 1200);

      /* 🔓 UNCOMMENT FOR REAL WEB BLUETOOTH (Requires HTTPS + Chrome/Edge)
      if (navigator.bluetooth) {
        try {
          const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true });
          connectDevice('BT', device.name || 'Unknown BT Device');
        } catch(e) { console.log('BT scan cancelled'); }
      }
      */
    });

    // FM Tuner (Simulated)
    tuneFm.addEventListener('click', () => {
      const freq = parseFloat(fmFreq.value);
      if (isNaN(freq) || freq < 88.1 || freq > 108.0) {
        return alert('📻 Enter frequency between 88.1 - 108.0 MHz');
      }
      fmStatus.textContent = 'Tuning...';
      setTimeout(() => {
        fmStatus.innerHTML = '✅ Locked Signal';
        connectDevice('FM', `${freq.toFixed(1)} MHz`);
      }, 900);
    });

    // Connection
    function connectDevice(type, name) {
      isConnected = true;
      channel = `${type}: ${name}`;
      updateUI();
      statusBar.textContent = `Connected | Mode: ${mode} | Channel: ${channel}`;
    }

    // UI Updater
    function updateUI() {
      statusLed.className = isConnected ? 'led connected' : 'led';
      btnTx.classList.toggle('active', mode === 'TX');
      btnRx.classList.toggle('active', mode === 'RX');
      
      if (!isConnected) statusBar.textContent = `Ready | Mode: ${mode} | Channel: None`;
      pttBtn.textContent = mode === 'TX' ? '🔊 TRANSMITTING...' : '🎤 HOLD TO TRANSMIT';
    }
  </script>
</body>
</html>
